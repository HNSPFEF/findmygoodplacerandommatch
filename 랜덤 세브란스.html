<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>당신에게 알맞는 곳은?!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f4f8;
            font-family: 'Malgun Gothic', sans-serif;
        }

        /* 룰렛 컨테이너와 화살표 */
        .roulette-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 40px;
        }

        /* 화살표 (12시 방향) */
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #FF3B30;
            z-index: 10;
            filter: drop-shadow(0px 3px 3px rgba(0,0,0,0.3));
        }

        /* 룰렛 캔버스 */
        #roulette {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            /* 회전 애니메이션 속성 */
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); 
        }

        .random-btn {
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 800;
            color: white;
            background: linear-gradient(135deg, #0055A5 0%, #003b73 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 85, 165, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .random-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 85, 165, 0.3);
        }

        .random-btn:active {
            transform: scale(0.95);
        }

        .random-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="roulette-container">
        <div class="pointer"></div>
        <canvas id="roulette" width="400" height="400"></canvas>
    </div>

    <button class="random-btn" id="spinBtn" onclick="spinRoulette()">
        🔍 당신에게 알맞는 곳은?!
    </button>

    <script>
        const hospitals = [
            { name: "어린이병원", url: "https://sev-children.severance.healthcare/sev-children/index.do", color: "#FFB3BA" },
            { name: "심장혈관병원", url: "https://sev-heart.severance.healthcare/sev-heart/index.do", color: "#FFDFBA" },
            { name: "재활병원", url: "https://sev-rehabil.severance.healthcare/sev-rehabil/index.do", color: "#FFFFBA" },
            { name: "연세암병원", url: "https://cancer.severance.healthcare/cancer/index.do", color: "#BAFFC9" },
            { name: "안과병원", url: "https://sev-eye.severance.healthcare/sev-eye/index.do", color: "#BAE1FF" },
            { name: "세브란스병원", url: "https://sev.severance.healthcare/sev/index.do", color: "#E0BBE4" }
        ];

        const canvas = document.getElementById("roulette");
        const ctx = canvas.getContext("2d");
        const btn = document.getElementById("spinBtn");

        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;
        const radius = width / 2;

        let currentRotation = 0; // 현재 회전 각도 저장

        // 룰렛 그리기 함수
        function drawRoulette() {
            const arc = (2 * Math.PI) / hospitals.length;

            for (let i = 0; i < hospitals.length; i++) {
                const startAngle = i * arc - (Math.PI / 2); // 12시 방향부터 시작하도록 -90도 조정
                const endAngle = startAngle + arc;

                // 피자 조각 그리기
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = hospitals[i].color;
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#ffffff";
                ctx.stroke();
                ctx.closePath();

                // 텍스트 그리기
                ctx.save();
                // 텍스트 위치를 각 조각의 중간 각도로 회전
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + arc / 2);
                
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#333333";
                ctx.font = "bold 20px 'Malgun Gothic'";
                // 텍스트를 끝부분에서 살짝 안쪽에 배치
                ctx.fillText(hospitals[i].name, radius - 30, 0);
                
                ctx.restore();
            }
        }

        // 룰렛 회전 함수
        function spinRoulette() {
            // 버튼 비활성화 (중복 클릭 방지)
            btn.disabled = true;

            const randomIndex = Math.floor(Math.random() * hospitals.length);
            const sliceAngle = 360 / hospitals.length;
            
            // 당첨된 조각이 12시 방향(0도)에 오도록 각도 계산
            // (i * sliceAngle + sliceAngle / 2)는 시작점(12시)에서 해당 조각의 중앙까지 시계방향 각도
            // 이것을 12시로 가져오려면 360에서 그만큼 빼주면 됨.
            const stopAngle = 360 - (randomIndex * sliceAngle + sliceAngle / 2);
            
            // 기본 5바퀴(1800도) 회전에 멈출 각도를 더함
            const spinDegrees = 360 * 5 + stopAngle; 
            
            // 기존 회전된 각도에 추가
            currentRotation += spinDegrees;

            // CSS transform을 통해 룰렛 회전 애니메이션 실행
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // 애니메이션이 끝나는 시간(4초 = 4000ms)에 맞춰 알림 및 페이지 이동
            setTimeout(() => {
                alert(`축하합니다! [${hospitals[randomIndex].name}]에 당첨되었습니다. 이동합니다!`);
                window.location.href = hospitals[randomIndex].url;
                
                // (선택사항) 뒤로가기로 돌아왔을 때를 대비해 버튼 다시 활성화
                btn.disabled = false; 
            }, 4000);
        }

        // 페이지 로드 시 룰렛 초기화
        drawRoulette();
    </script>

</body>
</html>
